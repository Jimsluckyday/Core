<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Core Betting Solutions — Today's Picks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --board-bg: #0f1f18;
    --board-panel: #16281f;
    --board-panel-2: #1b3026;
    --board-line: #2a4034;
    --cream: #f3ead9;
    --cream-dim: #b9ad97;
    --gold: #d4a12a;
    --win: #4caf6d;
    --loss: #e0685f;
    --push: #b9ad97;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--board-bg);
    color: var(--cream);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(243,234,217,0.035) 1px, transparent 0);
    background-size: 22px 22px;
    pointer-events: none;
  }

  header {
    padding: 48px 24px 32px;
    text-align: center;
    border-bottom: 1px solid var(--board-line);
    position: relative;
  }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'Anton', sans-serif;
    font-weight: 400;
    font-size: clamp(40px, 8vw, 72px);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin: 0;
    line-height: 0.95;
  }
  .sub {
    font-size: 14px;
    color: var(--cream-dim);
    margin-top: 14px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
  }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--cream-dim);
    font-size: 15px;
  }
  .empty strong { display: block; font-family: 'Anton', sans-serif; font-size: 22px; color: var(--cream); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.03em; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 22px;
  }

  .ticket {
    background: var(--board-panel);
    border: 1px solid var(--board-line);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    padding: 20px 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .ticket::before {
    /* perforated edge along the top, like a torn ticket stub */
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background-image: radial-gradient(circle at 10px 0, var(--board-bg) 5px, transparent 5.5px);
    background-size: 20px 6px;
    background-repeat: repeat-x;
  }

  .ticket-top {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
  }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    border: 1px solid var(--board-line);
    color: var(--cream-dim);
    white-space: nowrap;
  }
  .tag.sport { color: var(--gold); border-color: rgba(212,161,42,0.4); }

  .hot-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 2px;
    background: var(--gold);
    color: #1a1206;
    white-space: nowrap;
  }

  .stamp {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 4px 9px;
    border-radius: 2px;
    transform: rotate(-4deg);
    border: 2px solid currentColor;
    white-space: nowrap;
  }
  .stamp.win { color: var(--win); }
  .stamp.loss { color: var(--loss); }
  .stamp.push { color: var(--push); }
  .stamp.pending { color: var(--gold); }

  .date-nav {
    max-width: 1080px; margin: 24px auto 0; padding: 0 20px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    font-family: 'Space Mono', monospace; font-size: 12px; color: var(--cream-dim);
  }
  .date-nav input[type="date"] {
    background: var(--board-panel); border: 1px solid var(--board-line); color: var(--cream);
    padding: 7px 10px; border-radius: 2px; font-family: 'Space Mono', monospace; font-size: 12px;
  }
  .date-nav button {
    background: transparent; border: 1px solid var(--gold); color: var(--gold);
    padding: 7px 14px; border-radius: 2px; cursor: pointer; font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 600;
  }
  .date-nav button:hover { background: var(--gold); color: #1a1206; }
  .date-nav .back-btn { border-color: var(--board-line); color: var(--cream-dim); }
  .date-nav .back-btn:hover { background: var(--board-line); color: var(--cream); }
  .viewing-banner {
    max-width: 1080px; margin: 14px auto 0; padding: 0 20px;
    font-family: 'Space Mono', monospace; font-size: 12px; color: var(--gold);
  }

  .selection {
    font-family: 'Anton', sans-serif;
    font-size: 21px;
    text-transform: uppercase;
    line-height: 1.15;
    letter-spacing: 0.01em;
  }
  .selection .line {
    font-family: 'Space Mono', monospace;
    color: var(--gold);
    font-size: 17px;
    margin-left: 8px;
  }
  .selection .odds {
    font-family: 'Space Mono', monospace;
    color: var(--cream-dim);
    font-size: 13px;
    margin-left: 8px;
    font-weight: 400;
  }
  .prop-detail {
    font-size: 12px;
    color: var(--cream-dim);
    font-family: 'Space Mono', monospace;
  }

  .ticket-bottom {
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px dashed var(--board-line);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px;
    color: var(--cream-dim);
  }

  .event-date { font-family: 'Space Mono', monospace; }

  footer {
    text-align: center;
    padding: 30px 20px 50px;
    font-size: 11px;
    color: var(--cream-dim);
    font-family: 'Space Mono', monospace;
  }

  /* --- lightweight connection setup, only shown if no config saved yet --- */
  .setup {
    max-width: 420px; margin: 60px auto; padding: 24px;
    background: var(--board-panel); border: 1px solid var(--board-line); border-radius: 4px;
  }
  .setup h2 { font-family: 'Anton', sans-serif; text-transform: uppercase; font-size: 20px; margin: 0 0 14px; }
  .setup label { display: block; font-size: 12px; color: var(--cream-dim); margin-bottom: 6px; }
  .setup input {
    width: 100%; padding: 10px; margin-bottom: 14px; border-radius: 2px;
    border: 1px solid var(--board-line); background: var(--board-bg); color: var(--cream);
    font-family: 'Space Mono', monospace; font-size: 13px;
  }
  .setup button {
    width: 100%; padding: 11px; border-radius: 2px; border: none;
    background: var(--gold); color: #1a1206; font-weight: 700; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 14px;
  }
  .setup .err { color: var(--loss); font-size: 12px; margin-top: 10px; }

  @media (prefers-reduced-motion: no-preference) {
    .ticket { animation: rise 0.35s ease backwards; }
  }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Featured Selections</div>
  <h1>Core Betting Solutions</h1>
  <div class="sub">Helping you maximize your betting potential with our proprietary software.</div>
</header>

<div class="date-nav">
  <label for="viewDateInput">View a past day's results:</label>
  <input type="date" id="viewDateInput" />
  <button id="viewDateBtn">View</button>
  <button class="back-btn" id="backToTodayBtn" style="display:none;">Back to Today's Picks</button>
</div>
<div class="viewing-banner" id="viewingBanner" style="display:none;"></div>

<main id="mainContent">
  <div class="empty"><strong>Loading the board...</strong></div>
</main>

<footer>Odds and results shown are for informational purposes. Bet responsibly.</footer>

<script>
(function() {
  const hasClaudeStorage = () => typeof window.storage !== 'undefined' && window.storage;
  async function storageGet(key) {
    if (hasClaudeStorage()) {
      try { const r = await window.storage.get(key, false); return r ? r.value : null; } catch (e) { return null; }
    }
    try { return localStorage.getItem(key); } catch (e) { return null; }
  }
  async function storageSet(key, value) {
    if (hasClaudeStorage()) { try { await window.storage.set(key, value, false); } catch (e) {} return; }
    try { localStorage.setItem(key, value); } catch (e) {}
  }

  let config = null;
  let viewingDate = null; // null = today's pending picks; otherwise a "YYYY-MM-DD" being viewed

  async function rest(path) {
    const res = await fetch(`${config.url}/rest/v1/${path}`, {
      headers: { apikey: config.anonKey, Authorization: `Bearer ${config.anonKey}` }
    });
    if (!res.ok) {
      let msg = res.statusText;
      try { const e = await res.json(); msg = e.message || msg; } catch (_) {}
      throw new Error(msg);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  }

  function escapeHtml(str) {
    return String(str == null ? '' : str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function resultStampHtml(result) {
    if (result === 'win') return '<span class="stamp win">Win</span>';
    if (result === 'loss') return '<span class="stamp loss">Loss</span>';
    if (result === 'push') return '<span class="stamp push">Push</span>';
    return '<span class="stamp pending">Pending</span>';
  }

  function renderSetupForm(errorMsg) {
    document.getElementById('mainContent').innerHTML = `
      <div class="setup">
        <h2>Connect the board</h2>
        <label for="cfgUrl">Supabase project URL</label>
        <input id="cfgUrl" placeholder="https://xxxx.supabase.co" />
        <label for="cfgKey">Anon public key</label>
        <input id="cfgKey" placeholder="eyJ..." />
        <button id="cfgSave">Save &amp; load the board</button>
        ${errorMsg ? `<div class="err">${escapeHtml(errorMsg)}</div>` : ''}
      </div>`;
    document.getElementById('cfgSave').addEventListener('click', async () => {
      const url = document.getElementById('cfgUrl').value.trim().replace(/\/$/, '');
      const anonKey = document.getElementById('cfgKey').value.trim();
      if (!url || !anonKey) { renderSetupForm('Enter both the project URL and anon key.'); return; }
      config = { url, anonKey };
      await storageSet('supabase-config', JSON.stringify(config));
      loadBoard();
    });
  }

  function renderEmpty(title, message) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty">
        <strong>${escapeHtml(title || 'The board is empty right now')}</strong>
        ${escapeHtml(message || 'No picks are published at the moment — check back soon.')}
      </div>`;
  }

  function renderError(msg) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty">
        <strong>Couldn't load the board</strong>
        ${escapeHtml(msg)}
      </div>`;
  }

  function updateBannerAndButtons() {
    const banner = document.getElementById('viewingBanner');
    const backBtn = document.getElementById('backToTodayBtn');
    if (viewingDate) {
      banner.style.display = 'block';
      banner.textContent = `Showing results for ${viewingDate} only.`;
      backBtn.style.display = 'inline-block';
    } else {
      banner.style.display = 'none';
      backBtn.style.display = 'none';
    }
  }

  async function loadBoard() {
    updateBannerAndButtons();
    if (viewingDate) {
      await loadPastDateResults(viewingDate);
    } else {
      await loadTodayBoard();
    }
  }

  async function loadTodayBoard() {
    document.getElementById('mainContent').innerHTML = '<div class="empty"><strong>Loading the board...</strong></div>';
    try {
      // Only currently-pending picks show here -- selecting a past date
      // (below) replaces this entirely with that day's graded results.
      // capper_id is fetched ONLY to check against capper_hot_status below --
      // it's an opaque internal number, never rendered, and the capper's
      // NAME is never requested at all, here or anywhere on this page.
      const picks = await rest('picks?select=id,event_date,selection,line,prop_player,prop_stat,opening_odds,closing_odds,capper_id,sports(name),bet_types(name)&is_published=eq.true&result=eq.pending&order=event_date.asc');
      if (!picks.length) { renderEmpty(); return; }

      // Streaks are computed server-side (see capper_hot_status view) and
      // exposed as a plain yes/no per capper -- this page can't read raw
      // pick history directly (RLS only allows published rows), which is
      // intentional. This view is the one sanctioned, minimal exception.
      const capperIds = Array.from(new Set(picks.map(p => p.capper_id).filter(id => id !== null && id !== undefined)));
      const hotCapperIds = new Set();
      if (capperIds.length) {
        try {
          const hotRows = await rest(`capper_hot_status?select=capper_id&capper_id=in.(${capperIds.join(',')})`);
          hotRows.forEach(r => hotCapperIds.add(r.capper_id));
        } catch (e) {
          // If the view isn't set up yet, just skip the badge entirely
          // rather than breaking the whole board.
          console.error('Hot pick check failed:', e.message);
        }
      }

      const cardsHtml = picks.map((p, i) => {
        const propBit = (p.prop_player || p.prop_stat)
          ? `<div class="prop-detail">${escapeHtml(p.prop_player || '')} ${escapeHtml(p.prop_stat || '')}</div>`
          : '';
        // Show whichever odds are on file -- opening odds if set, otherwise
        // closing, otherwise nothing at all (not every pick will have odds
        // entered right away, and that's fine -- the card just omits it).
        const oddsVal = (p.opening_odds !== null && p.opening_odds !== undefined) ? p.opening_odds
          : ((p.closing_odds !== null && p.closing_odds !== undefined) ? p.closing_odds : null);
        const oddsHtml = oddsVal !== null ? `<span class="odds">${oddsVal > 0 ? '+' : ''}${oddsVal}</span>` : '';
        const hotBadge = hotCapperIds.has(p.capper_id) ? `<span class="hot-badge">&#128293; Hot Pick</span>` : '';
        return `
        <div class="ticket" style="animation-delay:${Math.min(i, 10) * 40}ms;">
          <div class="ticket-top">
            <div class="tags">
              <span class="tag sport">${escapeHtml(p.sports ? p.sports.name : '')}</span>
              <span class="tag">${escapeHtml(p.bet_types ? p.bet_types.name : '')}</span>
            </div>
            ${hotBadge}
          </div>
          <div>
            <div class="selection">${escapeHtml(p.selection)}${p.line !== null && p.line !== undefined ? `<span class="line">${p.line > 0 ? '+' : ''}${p.line}</span>` : ''}${oddsHtml}</div>
            ${propBit}
          </div>
          <div class="ticket-bottom">
            <div class="event-date">${p.event_date}</div>
          </div>
        </div>`;
      }).join('');

      document.getElementById('mainContent').innerHTML = `<div class="grid">${cardsHtml}</div>`;
    } catch (e) {
      renderError(e.message);
    }
  }

  async function loadPastDateResults(dateStr) {
    document.getElementById('mainContent').innerHTML = '<div class="empty"><strong>Loading results...</strong></div>';
    try {
      // Every published pick for exactly this one date, whatever its result
      // -- this replaces the today/pending view entirely, on purpose, so
      // there's never a mix of two different days shown at once.
      const picks = await rest(`picks?select=id,event_date,selection,line,prop_player,prop_stat,opening_odds,closing_odds,result,sports(name),bet_types(name)&is_published=eq.true&event_date=eq.${dateStr}&order=id.asc`);
      if (!picks.length) {
        renderEmpty('No picks for that day', `Nothing was published on ${dateStr}.`);
        return;
      }

      const cardsHtml = picks.map((p, i) => {
        const propBit = (p.prop_player || p.prop_stat)
          ? `<div class="prop-detail">${escapeHtml(p.prop_player || '')} ${escapeHtml(p.prop_stat || '')}</div>`
          : '';
        const oddsVal = (p.opening_odds !== null && p.opening_odds !== undefined) ? p.opening_odds
          : ((p.closing_odds !== null && p.closing_odds !== undefined) ? p.closing_odds : null);
        const oddsHtml = oddsVal !== null ? `<span class="odds">${oddsVal > 0 ? '+' : ''}${oddsVal}</span>` : '';
        return `
        <div class="ticket" style="animation-delay:${Math.min(i, 10) * 40}ms;">
          <div class="ticket-top">
            <div class="tags">
              <span class="tag sport">${escapeHtml(p.sports ? p.sports.name : '')}</span>
              <span class="tag">${escapeHtml(p.bet_types ? p.bet_types.name : '')}</span>
            </div>
            ${resultStampHtml(p.result)}
          </div>
          <div>
            <div class="selection">${escapeHtml(p.selection)}${p.line !== null && p.line !== undefined ? `<span class="line">${p.line > 0 ? '+' : ''}${p.line}</span>` : ''}${oddsHtml}</div>
            ${propBit}
          </div>
          <div class="ticket-bottom">
            <div class="event-date">${p.event_date}</div>
          </div>
        </div>`;
      }).join('');

      document.getElementById('mainContent').innerHTML = `<div class="grid">${cardsHtml}</div>`;
    } catch (e) {
      renderError(e.message);
    }
  }

  (async function init() {
    document.getElementById('viewDateBtn').addEventListener('click', () => {
      const val = document.getElementById('viewDateInput').value;
      if (!val) return;
      viewingDate = val;
      loadBoard();
    });
    document.getElementById('backToTodayBtn').addEventListener('click', () => {
      viewingDate = null;
      document.getElementById('viewDateInput').value = '';
      loadBoard();
    });

    const raw = await storageGet('supabase-config');
    if (raw) {
      try { config = JSON.parse(raw); } catch (e) {}
    }
    if (!config || !config.url || !config.anonKey) {
      renderSetupForm();
      return;
    }
    loadBoard();
  })();
})();
</script>
</body>
</html>
